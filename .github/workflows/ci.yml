name: Garmin MTP CLI

on:
  push:
  pull_request:

jobs:
  make-unix:
    name: Makefile (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15
          - ubuntu-22.04
          - ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies on macOS
        if: runner.os == 'macOS'
        run: brew install libmtp pkgconf

      - name: Install dependencies on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libmtp-dev

      - name: Build and test
        run: make clean check

  cmake-windows:
    name: CMake (windows-latest, MinGW)
    runs-on: windows-latest
    steps:
      - name: Keep LF line endings
        run: git config --global core.autocrlf input

      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            curl
            zip
            unzip
            tar
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf

      - name: Configure
        shell: msys2 {0}
        run: |
          cmake -S . -B build/cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGARMIN_MTP_WITH_LIBMTP=OFF

      - name: Build
        shell: msys2 {0}
        run: cmake --build build/cmake --config Release

      - name: Test
        shell: msys2 {0}
        run: ctest --test-dir build/cmake -C Release --output-on-failure

      - name: Smoke test command aliases
        shell: msys2 {0}
        run: |
          ./build/cmake/garmin-mtp.exe manual | grep "Garmin MTP directory manual"
          ./build/cmake/garminmtp.exe menu | grep "Garmin MTP directory manual"
