name: Garmin MTP CLI

on:
  push:
  pull_request:

jobs:
  make-unix:
    name: Makefile (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15
          - ubuntu-22.04
          - ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies on macOS
        if: runner.os == 'macOS'
        run: brew install libmtp pkgconf

      - name: Install dependencies on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libmtp-dev

      - name: Build and test
        run: make clean check

  cmake-windows:
    name: CMake (windows-latest, MinGW)
    runs-on: windows-latest
    steps:
      - name: Keep LF line endings
        run: git config --global core.autocrlf input

      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            curl
            zip
            unzip
            tar
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf

      - name: Configure vcpkg environment
        shell: pwsh
        run: |
          if ($env:VCPKG_INSTALLATION_ROOT) {
            "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            git clone https://github.com/microsoft/vcpkg "$env:RUNNER_TEMP\vcpkg"
            & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat"
            "VCPKG_ROOT=$env:RUNNER_TEMP\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "CMAKE_TOOLCHAIN_FILE=$env:RUNNER_TEMP\vcpkg\scripts\buildsystems\vcpkg.cmake" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Install dependencies
        shell: msys2 {0}
        run: |
          VCPKG_ROOT_UNIX="$(cygpath -u "$VCPKG_ROOT")"
          "$VCPKG_ROOT_UNIX/vcpkg.exe" install --triplet x64-mingw-dynamic

      - name: Configure
        shell: msys2 {0}
        run: |
          cmake -S . -B build/cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$(cygpath -u "$CMAKE_TOOLCHAIN_FILE")" \
            -DVCPKG_TARGET_TRIPLET=x64-mingw-dynamic

      - name: Build
        shell: msys2 {0}
        run: cmake --build build/cmake --config Release

      - name: Test
        shell: msys2 {0}
        run: ctest --test-dir build/cmake -C Release --output-on-failure

      - name: Smoke test command aliases
        shell: msys2 {0}
        run: |
          ./build/cmake/garmin-mtp.exe manual | grep "Garmin MTP directory manual"
          ./build/cmake/garminmtp.exe menu | grep "Garmin MTP directory manual"
